<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>os-artificer 技术圈</title>
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/article.css">
</head>

<body>
    <div id="app">
        <nav class="nav" aria-label="文章导航">
            <h2>文章索引</h2>

            <details
                v-for="cat in categories"
                :key="cat.key"
                class="nav-group"
                :open="cat.open"
                @toggle="onToggle(cat, $event)"
            >
                <summary :class="cat.summaryClass">{{ cat.title }}</summary>
                <ul>
                    <li v-for="it in cat.items" :key="it.href">
                        <a
                            :href="it.href"
                            target="article"
                            :class="{ active: activeHref === it.href }"
                            @click.prevent="openArticle(it.href)"
                        >
                            {{ it.text }}
                        </a>
                    </li>
                </ul>
            </details>

            <div class="nav-footer">
                欢迎关注订阅公众号：os-artificer 技术圈
            </div>

        <div class="nav-qr">
            <picture>
                <source srcset="./images/wechat-qrcode.webp" type="image/webp">
                <img
                    src="./images/wechat-qrcode.png"
                    alt="公众号二维码"
                    decoding="async"
                />
            </picture>
        </div>
        </nav>

        <main class="main">
            <div id="article" aria-live="polite"></div>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="./script/app.js"></script>
</body>

</html>
